<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotHotHot - Domotique</title>
    <link rel="stylesheet" type="text/css" href="styless.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
<button id="btn-install" style="display: none;">BIEN LE BONJOUR</button>
<p>CONSEIL : ne sois pas FAIBLE</p>

<section  id="Temperatures">
    <h2>Tableau des temperature :</h2>

    <div class="tabs">
        <div role="tablist" aria-labelledby="tablist-1" class="manual ">
            <button id="TempeDirect" type="button" role="tab" aria-selected="true" aria-controls="tabpanel-1">
                <span class="focus">Direct</span>
            </button>
            <button id="Historique" type="button" role="tab" aria-selected="false" aria-controls="tabpanel-2" tabindex="-1">
                <span class="focus">Historique</span>
            </button>

        </div>

        <div id="tabpanel-1" role="tabpanel" aria-labelledby="TempeDirect-1">
            <p id="message" role="alert" aria-live="assertive"></p>
            <p id="tempList" role="status" aria-live="polite"></p>
        </div>
        <div id="tabpanel-2" role="tabpanel" aria-labelledby="Historique-2" class="is-hidden">
            <h3>Historique des températures</h3>
            <table id="historyTable">
                <thead>
                <tr>
                    <th>Heure</th>
                    <th>Température</th>
                </tr>
                </thead>
                <tbody id="historyList">
                </tbody>
            </table>
        </div>

    </div>
</section>

<script src="js/tabs.js"></script>
<script src="js/eventManager.js"></script>
<script src="js/temperatureDisplay.js"></script>
<script src="js/script.js"></script>
</body>
</html>
